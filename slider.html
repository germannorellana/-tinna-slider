<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tinna Candles – Slider</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1008;
    }
    .slider {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide.active { opacity: 1; }
    .slide:nth-child(1) { background-image: url('slide1.jpg'); }
    .slide:nth-child(2) { background-image: url('slide2.jpg'); }
    .slide:nth-child(3) { background-image: url('slide3.jpg'); }
    .slide:nth-child(4) { background-image: url('slide4.jpg'); }
    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(30, 20, 15, 0.52);
    }
    .slide-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.9s ease 0.4s, transform 0.9s ease 0.4s;
      max-width: 780px;
    }
    .slide.active .slide-content {
      opacity: 1;
      transform: translateY(0);
    }
    .slide-content::before {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: #C9A882;
      margin: 0 auto 22px;
    }
    .slide-content h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      color: #F5EBD8;
      line-height: 1.15;
      letter-spacing: 0.02em;
      margin-bottom: 18px;
    }
    .slide-content p {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: clamp(0.95rem, 2.2vw, 1.25rem);
      color: #E8D5C4;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(245, 235, 216, 0.12);
      border: 1px solid rgba(201, 168, 130, 0.35);
      color: #F5EBD8;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
      font-size: 1.1rem;
      user-select: none;
    }
    .arrow:hover {
      background: rgba(201, 168, 130, 0.3);
      border-color: #C9A882;
      color: #C9A882;
    }
    .arrow-left { left: 24px; }
    .arrow-right { right: 24px; }
    .dots {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(245, 235, 216, 0.35);
      cursor: pointer;
      transition: background 0.4s, transform 0.4s;
    }
    .dot.active {
      background: #C9A882;
      transform: scale(1.35);
    }
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      width: 0%;
      background: #C9A882;
      z-index: 10;
    }
    @media (max-width: 600px) {
      .arrow { width: 38px; height: 38px; font-size: 0.9rem; }
      .arrow-left { left: 12px; }
      .arrow-right { right: 12px; }
    }
  </style>
</head>
<body>
<div class="slider" id="slider">
  <div class="slide active">
    <div class="slide-content">
      <h2>Velas que cuentan historias</h2>
      <p>Hechas a mano, con amor y cera de soja pura</p>
    </div>
  </div>
  <div class="slide">
    <div class="slide-content">
      <h2>Souvenirs únicos</h2>
      <p>El regalo perfecto para tus eventos especiales</p>
    </div>
  </div>
  <div class="slide">
    <div class="slide-content">
      <h2>Centros de mesa que enamoran</h2>
      <p>Diseños exclusivos para cada celebración</p>
    </div>
  </div>
  <div class="slide">
    <div class="slide-content">
      <h2>Creá tu propia vela</h2>
      <p>Curso digital completo — aprendé desde cero</p>
    </div>
  </div>
  <div class="arrow arrow-left" onclick="changeSlide(-1)">&#8592;</div>
  <div class="arrow arrow-right" onclick="changeSlide(1)">&#8594;</div>
  <div class="dots" id="dots"></div>
  <div class="progress-bar" id="progressBar"></div>
</div>
<script>
  const slides = document.querySelectorAll('.slide');
  const dotsContainer = document.getElementById('dots');
  const progressBar = document.getElementById('progressBar');
  const INTERVAL = 5000;
  let current = 0, timer;
  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });
  function getDots() { return dotsContainer.querySelectorAll('.dot'); }
  function goTo(index) {
    slides[current].classList.remove('active');
    getDots()[current].classList.remove('active');
    current = (index + slides.length) % slides.length;
    slides[current].classList.add('active');
    getDots()[current].classList.add('active');
    resetProgress();
  }
  function changeSlide(dir) { clearInterval(timer); goTo(current + dir); startTimer(); }
  function resetProgress() {
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      progressBar.style.transition = 'width 5000ms linear';
      progressBar.style.width = '100%';
    }));
  }
  function startTimer() { clearInterval(timer); timer = setInterval(() => goTo(current + 1), INTERVAL); resetProgress(); }
  startTimer();
</script>
</body>
</html>
